name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install tesseract (optional OCR dependency)
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr

      - name: Install dependencies
        # opencv-python-headless: CI runners have no display libraries, and
        # the headless wheel provides the same cv2 API.
        run: |
          python -m pip install --upgrade pip
          pip install numpy Pillow opencv-python-headless pytesseract pytest

      - name: Run tests (includes randomized property suite)
        run: python -m pytest tests/ -q
